# Use version '3.8' of the Docker Compose file format. This version
# includes several features and improvements over previous versions.
version: '3.8'

# Define the services (containers) that make up your application.
services:
  # Service for the PostgreSQL database.
  fraud_postgres:
    # Use the official PostgreSQL 16 image from Docker Hub.
    image: postgres:16
    # Assign a specific name to the container for easy identification.
    container_name: fraud_postgres
    # Ensure the container always restarts if it stops.
    restart: always
    # Set environment variables for the PostgreSQL container,
    # including user, password, and database name.
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password
      POSTGRES_DB: fraud_detection_db
    # Map port 5433 on the host to port 5432 on the container.
    # This allows you to access the database from your host machine.
    ports:
      - "5433:5432"
    # Mount a named volume to persist PostgreSQL data.
    # This ensures data is not lost if the container is removed.
    volumes:
      - fraud_postgres_data:/var/lib/postgresql/data
    # Connect this service to the 'fraud_network'.
    networks:
      - fraud_network

  # Service for pgAdmin 4, a web-based administration tool for PostgreSQL.
  fraud_pgadmin:
    # Use the latest dpage/pgadmin4 image from Docker Hub.
    image: dpage/pgadmin4:latest
    # Assign a specific name to the container.
    container_name: fraud_pgadmin
    # Ensure the container always restarts.
    restart: always
    # Set environment variables for pgAdmin, including default login credentials.
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fraud.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    # Map port 8081 on the host to port 80 on the container (where pgAdmin runs).
    ports:
      - "8081:80"
    # Specify that pgAdmin depends on the 'fraud_postgres' service.
    # This ensures PostgreSQL starts before pgAdmin.
    depends_on:
      - fraud_postgres
    # Connect this service to the 'fraud_network'.
    networks:
      - fraud_network

# Define named volumes, which are used to persist data generated by Docker containers.
volumes:
  # Volume to store PostgreSQL database files.
  fraud_postgres_data:

# Define custom networks. Services connected to the same network can communicate with each other.
networks:
  # A custom bridge network for the services in this compose file.
  fraud_network:
    # Use the default bridge driver for the network.
    driver: bridge